        - paragraph [ref=e102]: The Cogito v2.1 LLMs are instruction tuned generative models. All models are released under MIT license for commercial use.
        - list [ref=e103]:
          - listitem [ref=e104]:
            - paragraph [ref=e105]: "The best open-weight LLM by a US company: Cogito v2.1 671B"
          - listitem [ref=e106]:
            - paragraph [ref=e107]: On most industry benchmarks and our internal evals, the model performs competitively to frontier closed and open models, while being ahead of any other US open model.
          - listitem [ref=e108]:
            - paragraph [ref=e109]: This model uses significantly fewer tokens amongst any similar capability models, because it has better reasoning capabilities. It also has improvements across instruction following, coding, longer queries, multi-turn and creativity.
          - listitem [ref=e110]:
            - paragraph [ref=e111]: This model is trained in over 30 languages and supports a context length of 128k.
