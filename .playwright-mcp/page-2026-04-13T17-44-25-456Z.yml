      - generic [ref=e138]:
        - paragraph [ref=e139]: NVIDIA Nemotron™ is a family of open models with open weights, training data, and recipes, delivering leading efficiency and accuracy for building specialized AI agents.
        - paragraph [ref=e140]:
          - strong [ref=e141]: Nemotron-3-Super
          - text: is a large language model (LLM) trained by NVIDIA, designed to deliver strong agentic, reasoning, and conversational capabilities. It is optimized for collaborative agents and high-volume workloads such as IT ticket automation. Like other models in the family, it responds to user queries and tasks by first generating a reasoning trace and then concluding with a final response. The model’s reasoning capabilities can be configured through a flag in the chat template.
        - paragraph [ref=e142]:
          - text: The model has
          - strong [ref=e143]: 12B active parameters
          - text: and
          - strong [ref=e144]: 120B parameters in total
          - text: .
        - paragraph [ref=e145]: "The supported languages include: English, French, German, Italian, Japanese, Spanish, and Chinese"
        - paragraph [ref=e146]: This model is ready for commercial use.
