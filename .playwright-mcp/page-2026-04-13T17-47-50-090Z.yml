      - heading "Readme" [level=2] [ref=e122]
      - generic [ref=e124]:
        - paragraph [ref=e125]:
          - img "logo" [ref=e126]
        - paragraph [ref=e127]: MiniMax M2.5 is the fastest-improving model series for coding and agentic workflows, trained with large-scale reinforcement learning across hundreds of thousands of real-world environments.
        - heading "Highlights" [level=3] [ref=e128]
        - list [ref=e129]:
          - listitem [ref=e130]:
            - paragraph [ref=e131]:
              - strong [ref=e132]: Coding
              - text: ". Trained on large-scale RL across 10+ languages (Python, Go, C, C++, TypeScript, Rust, Kotlin, Java, JavaScript, PHP, Lua, Dart, Ruby) and hundreds of thousands of real environments, M2.5 develops native “spec behavior”—planning architecture, structure, and design before writing code. It handles the full development lifecycle: system design from zero, environment setup, feature iteration, code review, and testing across Web, Android, iOS, Windows, and Mac."
          - listitem [ref=e133]:
            - paragraph [ref=e134]:
              - strong [ref=e135]: Leading agent performance
              - text: . M2.5 achieves 80.2% on SWE-Bench Verified, 51.3% on Multi-SWE-Bench, and 76.3% on BrowseComp—reaching a level comparable to the Claude Opus series on coding tasks. In search and tool-use tasks, the model demonstrates higher decision maturity—solving problems in fewer rounds with better token efficiency, saving roughly 20% in tool-call rounds compared to M2.1.
          - listitem [ref=e136]:
            - paragraph [ref=e137]:
              - strong [ref=e138]: 37% faster task completion
              - text: . Through improved task decomposition and more efficient chain-of-thought reasoning, M2.5 completes complex agentic tasks significantly faster. On SWE-Bench Verified, end-to-end runtime dropped from 31.3 minutes (M2.1) to 22.8 minutes—on par with Claude Opus 4.6’s 22.9 minutes—while also consuming fewer tokens per task (3.52M vs 3.72M).
        - paragraph [ref=e139]:
          - img "m2.5 benchmark" [ref=e140]
        - heading "Benchmarks" [level=3] [ref=e141]
        - paragraph [ref=e142]:
          - strong [ref=e143]: Coding
        - paragraph [ref=e144]: M2.5 represents a significant step up from M2.1, reaching performance comparable to the Claude Opus series on core software engineering tasks.
        - paragraph [ref=e145]:
          - img "image.png" [ref=e146]
        - paragraph [ref=e147]: MiniMax tested performance on the SWE-Bench Verified evaluation set using different coding agent harnesses.
        - paragraph [ref=e148]: "On Droid: 79.7(M2.5) > 78.9(Opus 4.6)"
        - paragraph [ref=e149]: "On OpenCode: 76.1(M2.5) > 75.9(Opus 4.6)"
        - paragraph [ref=e150]:
