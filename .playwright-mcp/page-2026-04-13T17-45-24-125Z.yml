      - generic [ref=e124]:
        - blockquote [ref=e125]:
          - paragraph [ref=e126]: Ollama’s cloud is officially licensed with MiniMax for commercial usage
        - paragraph [ref=e127]:
          - img "logo" [ref=e128]
        - paragraph [ref=e129]: MiniMax M2.7 is the first model in the M2-series to deeply participate in its own evolution, capable of building complex agent harnesses and completing highly elaborate productivity tasks through Agent Teams, complex Skills, and dynamic tool search.
        - heading "Highlights" [level=3] [ref=e130]
        - list [ref=e131]:
          - listitem [ref=e132]:
            - paragraph [ref=e133]:
              - strong [ref=e134]: Professional software engineering
              - text: . M2.7 delivers outstanding performance in real-world engineering scenarios including end-to-end project delivery, log analysis and bug troubleshooting, code security, and machine learning. On SWE-Pro it scored 56.22%, matching GPT-5.3-Codex and nearly approaching Opus’s best level. On VIBE-Pro (55.6%) and Terminal Bench 2 (57.0%), it demonstrates deep understanding of complex engineering systems.
          - listitem [ref=e135]:
            - paragraph [ref=e136]:
              - strong [ref=e137]: Professional work and complex environments
              - text: . In the GDPval-AA evaluation across 45 models, M2.7 achieved an ELO score of 1495, the highest among open-source models. It handles complex editing in Excel, PPT, and Word with multi-round high-fidelity revisions, and maintains a 97% skill adherence rate across 40 complex skills (each exceeding 2,000 tokens). On Toolathon, M2.7 reached 46.3% accuracy, a global top-tier result.
          - listitem [ref=e138]:
            - paragraph [ref=e139]:
              - strong [ref=e140]: Character consistency and entertainment
              - text: . M2.7 possesses excellent character consistency and emotional intelligence. MiniMax has open-sourced OpenRoom, a Web GUI interaction system where conversation drives real-time visual feedback and scene interactions with characters proactively engaging their environment.
