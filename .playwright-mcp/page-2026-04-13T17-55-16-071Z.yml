      - generic [ref=e137]:
        - paragraph [ref=e138]:
          - img [ref=e139]
        - blockquote [ref=e140]:
          - paragraph [ref=e141]:
            - text: This model requires
            - link "Ollama 0.13.3" [ref=e142] [cursor=pointer]:
              - /url: https://github.com/ollama/ollama/releases/tag/v0.13.3-rc0
            - text: or later.
        - paragraph [ref=e143]: Rnj-1 is a family of 8B parameter open-weight, dense models trained from scratch by Essential AI, optimized for code and STEM with capabilities on par with SOTA open-weight models. These models perform well across a range of programming languages and boast strong agentic capabilities (e.g., inside agentic frameworks like mini-SWE-agent), while also excelling at tool-calling. They additionally exhibit strong capabilities in math and science. Herein, rnj-1 refers to the base model, while rnj-1-instruct refers to the post-trained instruction tuned model.
        - paragraph [ref=e144]:
          - img "image.png" [ref=e145]
        - heading "Highlights of abilities" [level=3] [ref=e146]
        - list [ref=e147]:
          - listitem [ref=e148]:
            - strong [ref=e149]: "Code generation:"
            - text: Both
            - code [ref=e150]: rnj-1-instruct
            - text: and
            - code [ref=e151]: rnj-1
            - text: demonstrate strong code generation abilities as measured on tasks like HumanEval+, MBPP+, BigCodeBench, and LiveCodeBench v6. Both models compete with the strongest open weight models, sometimes outperforming even larger models such as GPT OSS 20B. We measured code comprehension abilities using the task of predicting inputs given outputs and vice-versa, Crux-IO. We find our models outperform comparable baselines. For multi-lingual code generation capabilities across programming languages we measure MultiPL-E on 6 languages (C++, TypeScript, Java, JavaScript, Shell, PHP) and we find performance close to the strongest model.
          - listitem [ref=e152]:
            - strong [ref=e153]: "Agentic and Tool Use:"
            - code [ref=e154]: rnj-1-instruct
            - text: dominates the pack on agentic coding, one of our target abilities. SWE-bench performance is indicative of the model’s ability to tackle everyday software engineering tasks. The model is an order of magnitude stronger than comparably sized models on SWE-bench and approaches the capabilities available in much larger models. It scores
            - code [ref=e155]: 20.8%
            - text: on SWE-bench Verified in bash-only mode, which is higher than Gemini 2.0 flash and Qwen2.5-Coder 32B Instruct under the same agentic framework (
            - link "leaderboard" [ref=e156] [cursor=pointer]:
              - /url: https://www.swebench.com/bash-only.html
            - text: ).
            - text: There is a surge of interest in developing models’ abilities to write performant code.
            - code [ref=e157]: rnj-1-instruct
            - text: is able to use a profiler to iteratively improve the performance of the code it writes. For instance, on
            - link "Enamel" [ref=e158] [cursor=pointer]:
              - /url: https://github.com/q-rz/enamel/tree/main
            - text: ", which measures abilities to write efficient solutions to algorithmic problems, the model outperforms all other models under the same setting."
            - text: Furthermore,
            - code [ref=e159]: rnj-1-instruct
            - text: surpasses comparable models in tool use performance as measured by the Berkeley Functional Calling Leaderboard (BFCL).
          - listitem [ref=e160]:
            - strong [ref=e161]: Code Infilling
            - text: ": Having specifically been trained on FIM-ed pre-training data,"
            - code [ref=e162]: rnj-1
            - text: exhibits strong infilling abilities, which have been further enhanced during post-training. The base model
            - code [ref=e163]: rnj-1
            - text: scores highly on HE-FIM-Python (avg) at 82.49% and
            - code [ref=e164]: rnj-1-instruct
            - text: achieves 86.21%.
          - listitem [ref=e165]:
            - strong [ref=e166]: "Mathematical Problem Solving:"
            - code [ref=e167]: rnj-1-instruct
            - text: shows strong mathematical abilities across several levels of difficulty from elementary math (GSM8k), high school and undergraduate math (Minerva-MATH), and competition math (AIME ‘24 and ‘25). On harder subjects, it outcompetes or is on par with the strongest model in the pack.
          - listitem [ref=e168]:
            - strong [ref=e169]: "Scientific Reasoning:"
            - code [ref=e170]: rnj-1-instruct
            - text: exhibits long-context reasoning abilities that are needed to solve hard science and technical questions in GPQA-Diamond and SuperGPQA.
