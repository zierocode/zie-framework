          - paragraph [ref=e563]:
            - text: "* HLE-Verified: a verified and revised version of Humanity’s Last Exam (HLE), accompanied by a transparent, component-wise verification protocol and a fine-grained error taxonomy. We open-source the dataset at https://huggingface.co/datasets/skylenage/HLE-Verified."
            - text: "* TAU2-Bench: we follow the official setup except for the airline domain, where all models are evaluated by applying the fixes proposed in the Claude Opus 4.5 system card."
            - text: "* MCPMark: GitHub MCP server uses v0.30.3 from api.githubcopilot.com; Playwright tool responses are truncated at 32k tokens."
            - text: "* Search Agent: most search agents built on our model adopt a simple context-folding strategy(256k): once the cumulative Tool Response length reaches a preset threshold, earlier Tool Responses are pruned from the history to keep the context within limits."
            - text: "* BrowseComp: we tested two strategies, simple context-folding achieved a score of 69.0, while using the same discard-all strategy as DeepSeek-V3.2 and Kimi K2.5 achieved 78.6."
            - text: "* WideSearch: we use a 256k context window without any context management."
            - text: "* MMLU-ProX: we report the averaged accuracy on 29 languages."
            - text: "* WMT24++: a harder subset of WMT24 after difficulty labeling and rebalancing; we report the averaged scores on 55 languages using XCOMET-XXL."
            - text: "* MAXIFE: we report the accuracy on English + multilingual original prompts (totally 23 settings)."
            - text: "* Empty cells (--) indicate scores not yet available or not applicable."
