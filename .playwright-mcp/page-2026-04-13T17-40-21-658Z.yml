    - generic [ref=e183]:
      - heading "Readme" [level=2] [ref=e185]
      - generic [ref=e187]:
        - paragraph [ref=e188]:
          - img [ref=e189]
        - paragraph [ref=e190]: Over recent months, we have intensified our focus on developing foundation models that deliver exceptional utility and performance. Qwen3.5 represents a significant leap forward, integrating breakthroughs in multimodal learning, architectural efficiency, reinforcement learning scale, and global accessibility to empower developers and enterprises with unprecedented capability and efficiency.
        - heading "Highlights" [level=2] [ref=e191]
        - paragraph [ref=e192]: "Qwen3.5 features the following enhancement:"
        - list [ref=e193]:
          - listitem [ref=e194]:
            - paragraph [ref=e195]:
              - strong [ref=e196]: Unified Vision-Language Foundation
              - text: ": Early fusion training on multimodal tokens achieves cross-generational parity with Qwen3 and outperforms Qwen3-VL models across reasoning, coding, agents, and visual understanding benchmarks."
          - listitem [ref=e197]:
            - paragraph [ref=e198]:
              - strong [ref=e199]: Efficient Hybrid Architecture
              - text: ": Gated Delta Networks combined with sparse Mixture-of-Experts deliver high-throughput inference with minimal latency and cost overhead."
          - listitem [ref=e200]:
            - paragraph [ref=e201]:
              - strong [ref=e202]: Scalable RL Generalization
              - text: ": Reinforcement learning scaled across million-agent environments with progressively complex task distributions for robust real-world adaptability."
          - listitem [ref=e203]:
            - paragraph [ref=e204]:
              - strong [ref=e205]: Global Linguistic Coverage
              - text: ": Expanded support to 201 languages and dialects, enabling inclusive, worldwide deployment with nuanced cultural and regional understanding."
          - listitem [ref=e206]:
            - paragraph [ref=e207]:
              - strong [ref=e208]: Next-Generation Training Infrastructure
              - text: ": Near-100% multimodal training efficiency compared to text-only training and asynchronous RL frameworks supporting massive-scale agent scaffolds and environment orchestration."
        - heading "Benchmarks" [level=2] [ref=e209]
        - paragraph [ref=e210]:
