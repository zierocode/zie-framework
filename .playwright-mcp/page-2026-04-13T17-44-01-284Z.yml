        - heading "2. Thinking Mode Configuration" [level=3] [ref=e490]
        - blockquote [ref=e491]:
          - paragraph [ref=e492]: Note that Ollama already handles the complexities of the chat template for you.
        - paragraph [ref=e493]:
          - text: Compared to Gemma 3, the models use standard
          - code [ref=e494]: system
          - text: ","
          - code [ref=e495]: assistant
          - text: ", and"
          - code [ref=e496]: user
          - text: "roles. To properly manage the thinking process, use the following control tokens:"
        - list [ref=e497]:
          - listitem [ref=e498]:
            - strong [ref=e499]: "Trigger Thinking:"
            - text: Thinking is enabled by including the
            - code [ref=e500]: <|think|>
            - text: token at the start of the system prompt. To disable thinking, remove the token.
          - listitem [ref=e501]:
            - strong [ref=e502]: "Standard Generation:"
            - text: "When thinking is enabled, the model will output its internal reasoning followed by the final answer using this structure:"
            - code [ref=e503]: <|channel>thought\n
            - strong [ref=e504]: "[Internal reasoning]"
            - code [ref=e505]: <channel|>
          - listitem [ref=e506]:
            - strong [ref=e507]: "Disabled Thinking Behavior:"
            - text: "For all models except for the E2B and E4B variants, if thinking is disabled, the model will still generate the tags but with an empty thought block:"
            - code [ref=e508]: <|channel>thought\n<channel|>
            - strong [ref=e509]: "[Final answer]"
        - heading "3. Multi-Turn Conversations" [level=3] [ref=e510]
        - list [ref=e511]:
          - listitem [ref=e512]:
            - strong [ref=e513]: No Thinking Content in History
            - text: ": In multi-turn conversations, the historical model output should only include the final response. Thoughts from previous model turns must"
            - emphasis [ref=e514]: not be added
            - text: before the next user turn begins.
        - heading "4. Modality order" [level=3] [ref=e515]
        - list [ref=e516]:
          - listitem [ref=e517]:
            - text: For optimal performance with multimodal inputs, place image and/or audio content
            - strong [ref=e518]: before
            - text: the text in your prompt.
        - heading "5. Variable Image Resolution" [level=3] [ref=e519]
        - paragraph [ref=e520]: Aside from variable aspect ratios, Gemma 4 supports variable image resolution through a configurable visual token budget, which controls how many tokens are used to represent an image. A higher token budget preserves more visual detail
        - paragraph [ref=e521]: at the cost of additional compute, while a lower budget enables faster inference for tasks that don’t require fine-grained understanding.
        - list [ref=e522]:
          - listitem [ref=e523]:
            - text: "The supported token budgets are:"
            - strong [ref=e524]: "70"
            - text: ","
            - strong [ref=e525]: "140"
            - text: ","
            - strong [ref=e526]: "280"
            - text: ","
            - strong [ref=e527]: "560"
            - text: ", and"
            - strong [ref=e528]: "1120"
            - text: .
            - list [ref=e529]:
              - listitem [ref=e530]:
                - text: Use
                - emphasis [ref=e531]: lower budgets
                - text: for classification, captioning, or video understanding, where faster inference and processing many frames outweigh fine-grained detail.
              - listitem [ref=e532]:
                - text: Use
                - emphasis [ref=e533]: higher budgets
                - text: for tasks like OCR, document parsing, or reading small text.
