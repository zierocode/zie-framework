      - generic [ref=e161]:
        - paragraph [ref=e162]:
          - img "Gemma 4 Ollama logo" [ref=e163]
          - text: Gemma is a family of open models built by Google DeepMind. Gemma 4 models are multimodal, handling text and image input and generating text output.
        - paragraph [ref=e164]:
          - text: Gemma 4 introduces key
          - strong [ref=e165]: capability and architectural advancements
          - text: ":"
        - list [ref=e166]:
          - listitem [ref=e167]:
            - paragraph [ref=e168]:
              - strong [ref=e169]: Reasoning
              - text: – All models in the family are designed as highly capable reasoners, with configurable thinking modes.
          - listitem [ref=e170]:
            - paragraph [ref=e171]:
              - strong [ref=e172]: Extended Multimodalities
              - text: – Processes Text, Image with variable aspect ratio and resolution support (all models)
          - listitem [ref=e173]:
            - paragraph [ref=e174]:
              - strong [ref=e175]: Diverse & Efficient Architectures
              - text: – Offers Dense and Mixture-of-Experts (MoE) variants of different sizes for scalable deployment.
          - listitem [ref=e176]:
            - paragraph [ref=e177]:
              - strong [ref=e178]: Optimized for On-Device
              - text: – Smaller models are specifically designed for efficient local execution on laptops and mobile devices.
          - listitem [ref=e179]:
            - paragraph [ref=e180]:
              - strong [ref=e181]: Increased Context Window
              - text: – The small models feature a 128K context window, while the medium models support 256K.
          - listitem [ref=e182]:
            - paragraph [ref=e183]:
              - strong [ref=e184]: Enhanced Coding & Agentic Capabilities
              - text: – Achieves notable improvements in coding benchmarks alongside native function-calling support, powering highly capable autonomous agents.
          - listitem [ref=e185]:
            - paragraph [ref=e186]:
              - strong [ref=e187]: Native System Prompt Support
              - text: – Gemma 4 introduces native support for the
              - code [ref=e188]: system
              - text: role, enabling more structured and controllable conversations.
