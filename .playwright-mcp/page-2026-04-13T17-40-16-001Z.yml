    - generic [ref=e120]:
      - heading "Readme" [level=2] [ref=e122]
      - generic [ref=e124]:
        - paragraph [ref=e125]:
          - img [ref=e126]
        - paragraph [ref=e127]: GLM-5.1 is Z.AI’s next-generation flagship model for agentic engineering, with significantly stronger coding capabilities than its predecessor. It achieves state-of-the-art performance on SWE-Bench Pro and leads GLM-5 by a wide margin on NL2Repo (repo generation) and Terminal-Bench 2.0 (real-world terminal tasks).
        - paragraph [ref=e128]:
          - img "Coding eval" [ref=e129]
        - paragraph [ref=e130]: "But the most meaningful leap goes beyond first-pass performance. Previous models—including GLM-5—tend to exhaust their repertoire early: they apply familiar techniques for quick initial gains, then plateau. Giving them more time doesn’t help."
        - paragraph [ref=e131]: GLM-5.1, by contrast, is built to stay effective on agentic tasks over much longer horizons. We’ve found that the model handles ambiguous problems with better judgment and stays productive over longer sessions. It breaks complex problems down, runs experiments, reads results, and identifies blockers with real precision. By revisiting its reasoning and revising its strategy through repeated iteration, GLM-5.1 sustains optimization over hundreds of rounds and thousands of tool calls. The longer it runs, the better the result.
        - heading "Benchmark" [level=2] [ref=e132]
